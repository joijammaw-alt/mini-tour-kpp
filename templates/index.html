<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamphaeng Phet | One Day Mini Tour</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;400;600&family=Noto+Sans+Thai:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'Noto Sans Thai', sans-serif; background-color: #0d0f14; color: #e2e8f0; background-image: radial-gradient(circle at 50% 0%, #1e1b4b 0%, #0d0f14 70%); }
        .editorial-title { font-family: 'Cinzel', serif; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .neu-btn { background: #131722; box-shadow: 4px 4px 10px #080a0f, -4px -4px 10px #1e2435; transition: all 0.3s ease; }
        .neu-btn:hover { box-shadow: inset 2px 2px 5px #080a0f, inset -2px -2px 5px #1e2435; color: #00f2fe; }
        .neu-btn-primary { background: linear-gradient(135deg, #0072ff 0%, #00f2fe 100%); box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3); }
    </style>
</head>
<body class="min-h-screen antialiased">
    <header class="max-w-6xl mx-auto px-6 pt-20 pb-16 text-center border-b border-slate-800/60">
        <p class="text-xs uppercase tracking-[0.3em] text-cyan-400 font-semibold mb-3">Exquisite Escape</p>
        <h1 class="editorial-title text-5xl md:text-7xl font-bold tracking-tight text-white mb-6">KAMPHAENG PHET</h1>
        <p class="text-slate-400 max-w-xl mx-auto font-light text-sm leading-relaxed">บันทึกการเดินทาง 1 วันผ่านเมืองมรดกโลกและผืนป่าตะวันตกอันอุดมสมบูรณ์ เรียบง่าย ล้ำสมัย และงดงาม</p>
    </header>
    <main class="max-w-6xl mx-auto px-6 py-16">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mb-20">
            {% for loc in locations %}
            <div class="glass-card rounded-2xl overflow-hidden flex flex-col justify-between p-6 transition-all duration-300 hover:-translate-y-1">
                <div>
                    <div class="relative overflow-hidden aspect-[4/3] bg-slate-900 rounded-xl mb-4">
                        <img src="{{ loc.image }}" class="object-cover w-full h-full opacity-80">
                    </div>
                    <h3 class="text-xl font-semibold text-white mb-2">{{ loc.name }}</h3>
                    <p class="text-slate-400 text-xs font-light leading-relaxed mb-6">{{ loc.description }}</p>
                </div>
                <a href="https://www.google.com/maps/search/?api=1&query={{ loc.lat }},{{ loc.lng }}" target="_blank" class="neu-btn block w-full py-3 text-center rounded-xl text-xs font-medium text-slate-300 tracking-wider uppercase">ข้อมูลเส้นทาง</a>
            </div>
            {% endfor %}
        </div>
        <section class="glass-card rounded-3xl p-6 border border-white/10">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                <div>
                    <h2 class="editorial-title text-2xl font-bold text-white">Interactive Route Map</h2>
                </div>
                <a href="{{ full_route_url }}" target="_blank" class="neu-btn-primary px-6 py-3 rounded-xl text-xs font-bold text-slate-900 tracking-widest uppercase">Explore Route</a>
            </div>
            <div class="rounded-2xl overflow-hidden border border-slate-800 h-[450px]">{{ map_html|safe }}</div>
        </section>
    </main>
</body>
</html>
